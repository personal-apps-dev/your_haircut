<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Твоя Зачіска · iOS prototype</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #E8E3DA; font-family: 'Geist', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    /* Animations */
    @keyframes tz-fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes tz-progress {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes tz-pulse {
      0%   { transform: scale(0.85); opacity: 0.7; }
      100% { transform: scale(1.4);  opacity: 0; }
    }
    @keyframes tz-pulse-dot {
      0%, 100% { transform: scale(0.8); opacity: 0.6; }
      50%      { transform: scale(1.1); opacity: 1; }
    }
    @keyframes tz-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    @keyframes tz-flash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes tz-scan {
      0%   { top: -10%; }
      100% { top: 100%; }
    }
    @keyframes tz-ripple {
      0%   { width: 0; height: 0; opacity: 0.4; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    /* hide scrollbars */
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="screens-1.jsx"></script>
  <script type="text/babel" src="screens-2.jsx"></script>
  <script type="text/babel" src="screens-3.jsx"></script>
  <script type="text/babel" src="hair-quiz.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>

  <script type="text/babel">
    // mount once everything's transpiled
    setTimeout(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<window.App/>);
    }, 50);
  </script>
</body>
</html>
